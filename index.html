}
const cardKey=c=>c.rank+'|'+c.suit;
function bestFiveFingerprint(hole,board){ const all=[...hole,...board],n=all.length; let best=null,combo=null;
  for(let a=0;a<n-4;a++)for(let b=a+1;b<n-3;b++)for(let c=b+1;c<n-2;c++)for(let d=c+1;d<n-1;d++)for(let e=d+1;e<n;e++){
    const cb=[all[a],all[b],all[c],all[d],all[e]], s=evaluate5(cb);
    if(!best||cmpScore(s,best)>0){best=s;combo=cb;} }
  return new Set((combo||[]).map(cardKey)); }
function decorateShowdown(){
  if(stage!=='showdown'&&stage!=='done') return;
  const seatEls=[...el('seats').querySelectorAll('.seat')];
  players.forEach((p,i)=>{ const s=seatEls[i]; if(!s) return;
    if(p.isWinner&&p.winAmt>0&&!s.querySelector('.winbadge')){
      const wb=document.createElement('div'); wb.className='winbadge'; wb.textContent='WIN +'+p.winAmt;
      const who=s.querySelector('.who'); if(who) who.appendChild(wb); }
  });
  if(!revealAll) return;
  const boardKeys=new Set();
  players.forEach((p,i)=>{ const s=seatEls[i]; if(!s) return;
    const contender=!p.folded&&!p.sittingOut&&p.score;
    if(p.isWinner&&p.bestCards){ s.querySelectorAll('.hole .card').forEach(c=>{ if(p.bestCards.has(c.dataset.k)) c.classList.add('made'); }); p.bestCards.forEach(k=>boardKeys.add(k)); }
    else if(contender) s.querySelectorAll('.hole .card').forEach(c=>c.classList.add('muck'));
  });
  [...el('board').querySelectorAll('.card')].forEach(c=>{ if(boardKeys.has(c.dataset.k)) c.classList.add('made'); });
}
function coinBurstToSeat(p){ if(reduceMotion||!fxLayer()) return;
  const i=players.indexOf(p); if(i<0) return;
  const src=centerPx(), dst=seatPx(i);
  for(let k=0;k<14;k++){
    const coin=document.createElement('div'); coin.className='fxcoin';
    coin.style.left=src.x+'px'; coin.style.top=src.y+'px';
    coin.style.setProperty('--dx',(dst.x-src.x+(Math.random()*2-1)*26).toFixed(0)+'px');
    coin.style.setProperty('--dy',(dst.y-src.y+(Math.random()*2-1)*20).toFixed(0)+'px');
    coin.style.setProperty('--dur',(0.7+Math.random()*0.5).toFixed(2)+'s');
    coin.style.animationDelay=(k*22)+'ms';
    fxLayer().appendChild(coin); coin.addEventListener('animationend',()=>coin.remove());
  }
}
function dealAnimation(){ if(reduceMotion||!fxLayer()) return;
  const n=players.length, d=seatPos(dealerIndex,n);
  const from=pctToPx(50+(d.x-50)*0.72, 50+(d.y-50)*0.72); let k=0;
  for(let round=0;round<2;round++) for(let i=0;i<n;i++){ if(players[i].sittingOut) continue;
    const to=seatPx(i);
    setTimeout(()=>{ const s=document.createElement('div'); s.className='fx cardback';
      s.style.transform=`translate3d(${from.x}px,${from.y}px,0)`; fxLayer().appendChild(s);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        s.style.transition='transform .32s cubic-bezier(.4,0,.2,1), opacity .15s ease .25s';
        s.style.transform=`translate3d(${to.x}px,${to.y}px,0)`; s.style.opacity='0'; }));
      setTimeout(()=>s.remove(),700);
    }, (k++)*55); } }

function render(){
  // 公共牌 / 底池 / 階段
  const _pb=prevBoardCount;
  el('board').innerHTML = community.length
    ? community.map((c,ci)=>boardCardHTML(c, ci>=_pb, ci>=_pb?ci-_pb:null)).join('')
    : '<span style="color:rgba(255,255,255,.25);font-size:13px">— 等待發牌 —</span>';
  tweenPot(totalPot());
  const tags={preflop:'翻牌前',flop:'翻牌 FLOP',turn:'轉牌 TURN',river:'河牌 RIVER',showdown:'攤牌',done:''};
  el('stageTag').textContent = tags[stage]||'';

  // 座位
  const n=players.length;
  const seats=el('seats'); seats.innerHTML='';
  players.forEach((p,i)=>{
    const pos=seatPos(i,n);
    const seat=document.createElement('div');
    seat.className='seat'
      +(p.folded&&!p.sittingOut?' folded':'')+(p.sittingOut?' out':'')+(p.isWinner?' winner':'')
      +((p.allIn&&!p.folded&&!p.isWinner)?' allin':'');
    // turn 發光環的唯一來源：真的在等這位玩家行動（排除 all-in / 跑牌期 currentIndex=-1）
    if(currentIndex===i && (stage!=='done'&&stage!=='showdown') && !p.folded && !p.sittingOut && !p.allIn) seat.classList.add('turn');
    seat.style.left=pos.x+'%'; seat.style.top=pos.y+'%';
    const showFace = p.isHuman || revealAll;
    const holeHTML = p.hole.length
      ? p.hole.map(c=>cardHTML(c, showFace && !(p.folded&&revealAll), true)).join('')
      : '';
    const low = p.chips>0 && p.chips < bigBlind*5;
    const actCls = actKind(p.lastAction);
    seat.innerHTML=`
      <div class="who">
        <div class="name">${p.isHuman?'<span class="you">●</span>':''}${p.name}${p.personaLabel&&!p.isHuman?`<span class="plabel">${p.tilt>0.45?'😡':''}${p.personaLabel}</span>`:''}</div>
        <div class="chips ${low?'low':''}">🪙 ${p.sittingOut?'出局':p.chips}</div>
        <div class="hole">${holeHTML}</div>
        ${p.score&&revealAll&&!p.folded?`<div class="handname">${handName(p.score)}</div>`:''}
        ${p.lastAction&&stage!=='done'?`<div class="act ${actCls}">${p.lastAction}</div>`:''}
      </div>`;
    seats.appendChild(seat);

    // 莊家鈕
    if(i===dealerIndex && !p.sittingOut){
      const inset=seatPos(i,n);
      const db=document.createElement('div'); db.className='dealerbtn'; db.textContent='D';
      db.style.left=(50+(inset.x-50)*0.72)+'%'; db.style.top=(50+(inset.y-50)*0.72)+'%';
      seats.appendChild(db);
    }
    // 下注籌碼（往中心靠）
    if(p.streetBet>0){
      const bc=document.createElement('div'); bc.className='betchip';
      bc.innerHTML=`<span class="coin"></span>${p.streetBet}`;
      bc.style.left=(50+(pos.x-50)*0.58)+'%'; bc.style.top=(50+(pos.y-50)*0.58)+'%';
      seats.appendChild(bc);
    }
  });
  if(_pendingBet && _pendingBet.amt>0) flyChip(seatPx(_pendingBet.idx), betSpotPx(_pendingBet.idx), _pendingBet.amt, {dur:340});
  _pendingBet=null;
  renderLog();
  prevBoardCount = community.length;
  decorateShowdown();
}
function busyHuman(){ return false; }
function renderLog(){
  el('log').innerHTML = logs.slice(-9).map(l=>`<div class="l">${l}</div>`).join('');
}
function tag(p){ return p.isHuman?'<b>你</b>':`<b>${p.name}</b>`; }
function log(s){ logs.push(s); }

/* ---------- 行動列（人類控制）---------- */
function setActionBar(){
  const human=players[0];
  const myTurn = !busy && currentIndex===0 && (stage==='preflop'||stage==='flop'||stage==='turn'||stage==='river') && !human.folded && !human.allIn && !human.sittingOut;
  el('waitMsg').style.display = myTurn?'none':'block';
  el('controls').classList.toggle('acting', myTurn);
  if(stage==='done'){ el('waitMsg').innerHTML=''; }
  else if(!myTurn){ el('waitMsg').innerHTML='輪到對手行動<span class="dot">…</span>'; }
  if(!myTurn){ const cb=el('coachBox'); if(cb){cb.style.display='none'; cb.innerHTML='';} return; }

  const p=human;
  const toCall=betToMatch-p.streetBet;
  el('ccBtn').textContent = toCall<=0 ? '過牌' : (toCall>=p.chips?`跟注 ${p.chips} (All-in)`:`跟注 ${toCall}`);
  el('foldBtn').style.display = toCall>0 ? '' : 'none';   // 免費過牌時不顯示蓋牌（蓋牌＝白丟一手）

  const allInTo=p.streetBet+p.chips;
  let minTo = betToMatch===0 ? Math.min(allInTo,bigBlind) : Math.min(allInTo, betToMatch+lastRaiseSize);
  const canRaise = allInTo>betToMatch;
  const rb=el('raiseBtn'), sl=el('betSlider'), qb=el('quickBtns');
  if(!canRaise){ rb.style.display='none'; sl.parentElement.style.display='none'; qb.style.display='none'; }
  else {
    rb.style.display=''; sl.parentElement.style.display=''; qb.style.display='flex';
    rb.textContent = betToMatch===0?'下注':'加注';
    sl.min=minTo; sl.max=allInTo; sl.step=Math.max(1,Math.round(bigBlind/2));
    sl.value=minTo; el('betAmt').textContent=minTo;
    // 快速下注鈕
    const pot=totalPot();
    const presets=[['½ 底池',0.5],['¾ 底池',0.75],['1× 底池',1]];
    qb.innerHTML='';
    presets.forEach(([label,frac])=>{
      let t=betToMatch + Math.round(frac*pot/bigBlind)*bigBlind; t=Math.max(t,minTo); t=Math.min(t,allInTo);
      const b=document.createElement('button'); b.className='btn ghost'; b.textContent=label;
      b.onclick=()=>{ sl.value=t; el('betAmt').textContent=t; }; qb.appendChild(b);
    });
    const ai=document.createElement('button'); ai.className='btn'; ai.textContent='All-in '+allInTo;
    ai.onclick=()=>{ sl.value=allInTo; el('betAmt').textContent=allInTo; }; qb.appendChild(ai);
    if(lastMix && lastMix.allin>=20) ai.classList.add('allin-hot');   // GTO 建議該梭 → 金點提示
  }
  renderCoach();
}

/* ---------- 結果橫幅 ---------- */
function showdownRevealHTML(contenders){   // 攤牌一覽：依牌力大→小排，贏家標 🏆
  if(!contenders || contenders.length<2) return '';
  const sorted=[...contenders].sort((a,b)=>cmpScore(b.score,a.score));
  const rows=sorted.map(p=>
    `<div class="sdrow${p.isWinner?' win':''}">`+
      `<span class="sdname">${p.isHuman?'你':p.name}${p.isWinner?' 🏆':''}</span>`+
      `<span class="sdcards">${p.hole.map(c=>cardHTML(c,true,true)).join('')}</span>`+
      `<span class="sdhand">${handName(p.score)}</span>`+
    `</div>`).join('');
  return `<div class="sdreveal"><div class="sdrvtitle">🂠 攤牌一覽（誰拿什麼）</div>${rows}</div>`;
}
function showBanner(title, lines, fin, revealHTML){
  const b=el('banner');
  let reviewHTML='';
  if(fin){
    const net=fin.delta;
    reviewHTML=`<div class="netres ${net>=0?'pos':'neg'}">本手結果 ${net>=0?'+':''}${net}</div>`;
    if(fin.review.length){
      reviewHTML+=`<div class="reviewbox"><div class="rvtitle">📋 本手回顧（你的每個決定，為什麼）</div>`+
        `<div class="rv-honest">百分比是「GTO 風格近似」算的，方向對、能練觀念，但不是專業解牌器，別當聖旨。</div>`+
        fin.review.map(r=>{
          const g=r.score>=90?'good':r.score>=55?'ok':'bad', ic=r.score>=90?'✓':r.score>=55?'△':'✗';
          const nums=r.toCall>0?`<span class="rvnums">勝率 <b>${r.eqPct}%</b> vs 門票 <i>${r.oddsPct}%</i></span>`:`<span class="rvnums">你的勝率 <b>${r.eqPct}%</b></span>`;
          const map={蓋牌:'fold',過牌:'check',跟注:'call',下注:'raise'};
          const recTag=(r.score<90 && r.recAction&&r.recAction!==map[r.actName])?`<span class="rvrec">該：<b>${r.recLabel}</b></span>`:'';
          const share=(r.mixFreq!=null)?`<div class="rvshare">你選的「${r.actName}」在最佳策略裡約占 <b>${r.mixFreq}%</b>`+
            (r.mixFreq>=20?'（打在主流，漂亮）':r.mixFreq>0?'（偶爾這樣打也行）':`（不在最佳配比裡，主流是「${r.mixPrimary}」）`)+`</div>`:'';
          return `<div class="rv ${g}"><div class="rvhead"><span class="rvg">${ic}</span><span class="rvs">${r.stageName}·${r.actName}</span>${nums}${recTag}</div><div class="rvwhy">${r.why||r.tip}</div>${share}</div>`;
        }).join('')+`</div>`;
      // 本手剝削註解：依對手人格給一句「看人下菜」原則（每手一句，不逐列重複）
      const _vp=(fin.review.find(r=>r.villainPersona)||{}).villainPersona;
      if(_vp){
        const VX={'跟注站':'別唬他、有牌就加大收價值，他會一路付錢','石頭':'多偷他的盲；但他一下大注通常真有牌','瘋子':'少反加、留著抓他亂唬','狡猾':'小心他慢打埋伏的突襲加注','賭徒':'有牌耐心等他自爆送錢','緊兇':'他很穩、沒便宜可佔，別硬碰','老實':'他打得直白，照牌力跟就好'};
        reviewHTML+=`<div class="reviewbox" style="margin-top:8px"><div class="rvvillain">🎯 這手對手是「${_vp}」：${VX[_vp]||'看人下菜、別用同一套打法'}</div></div>`;
      }
      // 本手教學重點：抓分數最低那筆收斂成一條可記住的原則
      let pivot=null; fin.review.forEach(r=>{ if(r.score<90&&(!pivot||r.score<pivot.score)) pivot=r; });
      let msg;
      if(pivot){
        if(pivot.recAction==='fold') msg=`門票比勝率貴就丟——這手「${pivot.stageName}」你只有 ${pivot.eqPct}% 卻要付 ${pivot.oddsPct}% 門票。記住：勝率追不上要付的比例時，蓋牌是省錢，不丟臉。`;
        else if(pivot.recAction==='raise') msg=`最強的牌要敢收錢——這手你有 ${pivot.eqPct}% 勝率卻沒加好，下次手上是全場最大時，加注比保守多賺一截。`;
        else if(pivot.recAction==='call') msg=`便宜的門票別輕易丟——這手只要 ${pivot.oddsPct}% 就划算、你有 ${pivot.eqPct}%，這種價格通常值得跟下去。`;
        else msg=`牌力普通就別硬攻——${pivot.stageName} 那手偷雞偶一為之就好，不必每手都來。`;
      } else { msg=fin.delta>=0?(fin.madeHand?`這手每個決定都對，漂亮。你最後的牌型是「${fin.madeHand}」，就是牌桌上描金的那 5 張——靠的是打法，不是運氣。`:'這手每個決定都對，漂亮——照這樣打就是贏家打法。'):'別因為輸就懷疑——這手你打得對，只是對手後面補到牌。長期照這樣打，運氣會還你。'; }
      reviewHTML+=`<div class="takeaway"><span class="tk">💡 本手教學重點</span>${msg}</div>`;
    }
  }
  b.innerHTML=`<h3>${title}</h3>${lines.map(l=>`<div class="line">${l}</div>`).join('')}${revealHTML||''}${reviewHTML}
    <button class="btn next" id="nextHandBtn">下一手 →</button>`;
  b.style.display='block';
  el('nextHandBtn').onclick=()=>{ el('nextHandBtn').disabled=true; startNewHand(); };
  setActionBar();
}
function hideBanner(){ el('banner').style.display='none'; }

}
